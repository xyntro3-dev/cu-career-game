<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>CU Career Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--pink:#E91E8C;--pink2:#FF4DB8;--maroon:#6B0F2B;--gold:#F4C430;--gold2:#FFE066;--dark:#0D0710;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.09);--white:#FEFCFF;--muted:rgba(255,255,255,0.45);--success:#00E676;--fail:#FF1744;--radius:20px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--dark);min-height:100vh;overflow-x:hidden;color:var(--white);}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(233,30,140,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(233,30,140,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(233,30,140,0.15) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(107,15,43,0.3) 0%,transparent 70%);pointer-events:none;z-index:0;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
#screenHome{padding:0 0 48px;align-items:stretch;}
.home-hero{text-align:center;padding:32px 24px 20px;}
.hero-badge{font-size:13px!important;padding:8px 20px;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--maroon),rgba(233,30,140,0.6));border:1px solid rgba(233,30,140,0.5);border-radius:30px;padding:6px 16px;font-family:'Prompt',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.85);margin-bottom:14px;}
.hero-title{font-family:'Prompt',sans-serif;font-size:clamp(32px,6vw,48px);font-weight:800;line-height:1.15;margin-bottom:6px;}
.hero-title .cu{background:linear-gradient(135deg,var(--gold),var(--pink2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:16px;color:var(--muted);line-height:1.7;}
.section-label{font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 16px;margin-bottom:10px;}
.faculty-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 12px;}
.fac-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:14px;padding:18px 12px;cursor:pointer;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);text-align:center;position:relative;overflow:hidden;animation:fadeUp 0.35s both;}
.fac-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pink),var(--maroon));opacity:0;transition:opacity 0.2s;}
.fac-card:hover{border-color:rgba(233,30,140,0.6);transform:translateY(-4px) scale(1.03);box-shadow:0 12px 28px rgba(233,30,140,0.25);}
.fac-card:hover::before{opacity:0.08;}
.fac-card:active{transform:translateY(-1px) scale(0.98);}
.fac-emoji{font-size:38px;display:block;margin-bottom:6px;position:relative;z-index:1;transition:transform 0.2s;}
.fac-card:hover .fac-emoji{transform:scale(1.18) rotate(-5deg);}
.fac-name{font-family:'Prompt',sans-serif;font-size:13px;font-weight:600;color:var(--white);position:relative;z-index:1;line-height:1.4;}
.fac-eng{font-size:11px;color:var(--muted);position:relative;z-index:1;margin-top:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
#screenGame{align-items:center;justify-content:flex-start;padding:28px 20px 48px}
.game-container{width:100%;max-width:560px;display:flex;flex-direction:column;gap:18px;}
.game-topbar{display:flex;align-items:center;justify-content:space-between;}
.btn-back{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid var(--card-border);border-radius:10px;padding:10px 18px;font-family:'Prompt',sans-serif;font-size:16px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.btn-back:hover{background:rgba(255,255,255,0.12);color:var(--white);}
.topbar-fac{display:flex;align-items:center;gap:6px;font-family:'Prompt',sans-serif;font-size:16px;font-weight:600;color:var(--white);}
.dots-row{display:flex;gap:6px;justify-content:center;}
.dot{width:36px;height:9px;border-radius:4px;background:rgba(255,255,255,0.12);transition:all 0.35s;}
.dot.done-ok{background:var(--success);}
.dot.done-fail{background:var(--fail);}
.dot.current{background:var(--gold);box-shadow:0 0 10px rgba(244,196,48,0.6);}
.q-type-pill{display:inline-flex;align-items:center;gap:6px;border-radius:30px;padding:8px 20px;font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;align-self:center;}
.q-type-pill.career{background:rgba(244,196,48,0.12);border:1px solid rgba(244,196,48,0.4);color:var(--gold2);}
.q-type-pill.emoji{background:rgba(233,30,140,0.12);border:1px solid rgba(233,30,140,0.4);color:var(--pink2);}
.q-visual-box{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius);padding:32px 24px 24px;text-align:center;position:relative;overflow:hidden;}
.q-visual-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(233,30,140,0.08),transparent 70%);}
.q-visual{font-size:82px;display:block;margin-bottom:10px;animation:popBounce 0.5s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1;}
@keyframes popBounce{0%{transform:scale(0.3) rotate(-15deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
.q-text{font-family:'Prompt',sans-serif;font-size:clamp(19px,4vw,24px);font-weight:700;line-height:1.45;color:var(--white);position:relative;z-index:1;}
.choices-stack{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.choice{background:var(--card-bg);border:2px solid var(--card-border);border-radius:18px;padding:28px 20px;cursor:pointer;transition:all 0.2s;text-align:center;position:relative;overflow:hidden;}
.choice::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(233,30,140,0.15),transparent);opacity:0;transition:opacity 0.2s;}
.choice:hover:not(:disabled)::after{opacity:1;}
.choice:hover:not(:disabled){border-color:rgba(233,30,140,0.5);transform:translateY(-4px);box-shadow:0 10px 28px rgba(233,30,140,0.25);}
.choice-ico{font-size:44px;display:block;margin-bottom:10px;}
.choice-label{font-family:'Prompt',sans-serif;font-size:17px;font-weight:700;color:var(--white);display:block;margin-bottom:3px;}
.choice-sub{font-size:13px;color:var(--muted);display:block;}
.choice.correct{background:rgba(0,230,118,0.13)!important;border-color:var(--success)!important;animation:correctPop 0.5s ease;}
.choice.wrong{background:rgba(255,23,68,0.13)!important;border-color:var(--fail)!important;animation:wrongShake 0.5s ease;}
.choice.dim{opacity:0.3;transform:none!important;}
@keyframes correctPop{0%{transform:scale(1);}40%{transform:scale(1.08);}70%{transform:scale(0.96);}100%{transform:scale(1);}}





.tips-text strong{color:var(--gold2);}

@keyframes wrongShake{0%,100%{transform:translateX(0);}15%{transform:translateX(-10px);}35%{transform:translateX(9px);}55%{transform:translateX(-7px);}75%{transform:translateX(5px);}}
.feedback-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.2s;}
.feedback-overlay.show{opacity:1;}
.feedback-bg{position:absolute;inset:0;transition:background 0.25s;}
.feedback-overlay.ok .feedback-bg{background:rgba(0,230,118,0.1);}
.feedback-overlay.fail .feedback-bg{background:rgba(255,23,68,0.1);}
.feedback-badge{position:relative;z-index:1;border-radius:22px;padding:22px 26px;text-align:center;max-width:340px;width:90%;transform:scale(0.6);transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(24px);}
.feedback-overlay.show .feedback-badge{transform:scale(1);}
.feedback-overlay.ok .feedback-badge{background:rgba(0,20,10,0.88);border:2px solid var(--success);box-shadow:0 0 60px rgba(0,230,118,0.4),0 20px 60px rgba(0,0,0,0.6);}
.feedback-overlay.fail .feedback-badge{background:rgba(20,0,5,0.88);border:2px solid var(--fail);box-shadow:0 0 60px rgba(255,23,68,0.4),0 20px 60px rgba(0,0,0,0.6);}
.fb-tap-hint{font-family:'Prompt',sans-serif;font-size:11px;color:rgba(255,255,255,0.35);text-align:right;margin-bottom:4px;letter-spacing:0.5px;}
.fb-big{font-size:70px;display:block;margin-bottom:4px;animation:popBounce 0.4s cubic-bezier(.34,1.56,.64,1);}
.fb-title{font-family:'Prompt',sans-serif;font-size:30px;font-weight:800;margin-bottom:5px;}
.feedback-overlay.ok .fb-title{color:var(--success);}
.feedback-overlay.fail .fb-title{color:var(--fail);}
.fb-detail{font-size:17px;color:rgba(255,255,255,0.72);line-height:1.6;}
.fb-tips{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.12);display:flex;gap:8px;align-items:flex-start;text-align:left;}
.fb-tips-icon{font-size:16px;flex-shrink:0;}
.fb-tips-body{flex:1;}
.fb-tips-label{font-family:'Prompt',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.fb-tips-text{font-family:'Prompt',sans-serif;font-size:15px;color:rgba(255,255,255,0.7);line-height:1.6;}
.fb-tips-text strong{color:var(--gold2);}
#screenResult{align-items:center;justify-content:center;padding:24px 14px;}
.result-card{background:var(--card-bg);border:1.5px solid rgba(244,196,48,0.22);border-radius:26px;padding:36px 24px;max-width:420px;width:100%;text-align:center;backdrop-filter:blur(16px);box-shadow:0 0 80px rgba(244,196,48,0.07),0 24px 60px rgba(0,0,0,0.5);animation:popBounce 0.5s cubic-bezier(.34,1.56,.64,1);}
.res-fac{font-size:68px;display:block;margin-bottom:6px;}
.res-title{font-family:'Prompt',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;}
.res-score{font-family:'Prompt',sans-serif;font-size:72px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--pink2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:6px 0 3px;}
.res-out{font-size:16px;color:var(--muted);margin-bottom:16px;}
.score-dots{display:flex;gap:7px;justify-content:center;margin-bottom:18px;}
.sdot{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;}
.sdot.ok{background:rgba(0,230,118,0.14);border:2px solid var(--success);color:var(--success);}
.sdot.fail{background:rgba(255,23,68,0.14);border:2px solid var(--fail);color:var(--fail);}
.res-msg{background:rgba(255,255,255,0.04);border:1px solid var(--card-border);border-radius:13px;padding:16px 20px;font-size:16px;color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:22px;}
.res-msg strong{color:var(--gold2);}
.res-btns{display:flex;gap:9px;}
.btn-again{flex:1;padding:18px;border-radius:13px;border:2px solid rgba(233,30,140,0.5);background:transparent;font-family:'Prompt',sans-serif;font-size:17px;font-weight:700;color:var(--pink2);cursor:pointer;transition:all 0.2s;}
.btn-again:hover{background:rgba(233,30,140,0.1);}
.btn-home-res{flex:1;padding:18px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--gold),#C89600);font-family:'Prompt',sans-serif;font-size:17px;font-weight:800;color:var(--dark);cursor:pointer;transition:all 0.2s;}
.btn-home-res:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(244,196,48,0.35);}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;}
.cp{position:absolute;top:-16px;animation:fall linear forwards;border-radius:2px;}
@keyframes fall{to{transform:translateY(110vh) rotate(900deg);opacity:0;}}
@media(max-width:480px){.faculty-grid{grid-template-columns:repeat(3,1fr);}.fac-emoji{font-size:30px;}.fac-name{font-size:11px;}}
</style>
</head>
<body>
<div class="feedback-overlay" id="fbOverlay" onclick="nextQ()">
  <div class="feedback-bg"></div>
  <div class="feedback-badge">

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="screen active" id="screenHome">

<div class="screen" id="screenGame">

  </div>
</div>
  </div>
</div>

<div class="screen" id="screenResult">
  <div class="result-card">
    <span class="res-fac" id="resFacEmoji"></span>
    <div class="res-title" id="resTitle"></div>
    <div class="res-score" id="resScore">0</div>
    <div class="res-out">จาก 5 ข้อ</div>
    <div class="score-dots" id="resDots"></div>
    <div class="res-msg" id="resMsg"></div>
    <div class="res-btns">

      <button class="btn-home-res" onclick="goHome()">🏠 เลือกคณะใหม่</button>
    </div>
  </div>
</div>

// ── STATE ──
let CF=null,QP=[],CI=0,RS=[],ANS=false;

// ── BUILD HOME ──
function buildHome(){
  const g=document.getElementById('facultyGrid');g.innerHTML='';
  F.forEach((f,i)=>{
    const c=document.createElement('div');c.className='fac-card';c.style.animationDelay=(i*.03)+'s';
    c.innerHTML=`<span class="fac-emoji">${f.emoji}</span><div class="fac-name">${f.name}</div><div class="fac-eng">${f.eng}</div>`;
    c.onclick=()=>startFac(f);g.appendChild(c);
  });
}
function startFac(f){
  CF=f;QP=[...f.qs].sort(()=>Math.random()-.5).slice(0,5);CI=0;RS=[];ANS=false;
  document.getElementById('topFacEmoji').textContent=f.emoji;
  document.getElementById('topFacName').textContent=f.name;
  buildDots();showS('screenGame');renderQ();
}
function buildDots(){
  const r=document.getElementById('dotsRow');r.innerHTML='';
  for(let i=0;i<5;i++){const d=document.createElement('div');d.className='dot'+(i===0?' current':'');d.id='d'+i;r.appendChild(d);}
}
function renderQ(){
  ANS=false;const q=QP[CI];
  for(let i=0;i<5;i++){const d=document.getElementById('d'+i);d.className='dot';
    if(i<CI)d.classList.add(RS[i]?'done-ok':'done-fail');else if(i===CI)d.classList.add('current');}
  const p=document.getElementById('qtypePill');
  if(q.t==='career'){p.className='q-type-pill career';p.textContent='🏛️ สาขาอาชีพ';}
  else{p.className='q-type-pill emoji';p.textContent='🔍 ทายอาชีพจาก Emoji';}
  const vis=document.getElementById('qVisual');
  vis.textContent=q.v;vis.style.animation='none';void vis.offsetWidth;vis.style.animation='popBounce .5s cubic-bezier(.34,1.56,.64,1)';
  document.getElementById('qText').textContent=q.q;
  const st=document.getElementById('choicesStack');st.innerHTML='';
  const correct=q.c.find(c=>c.ok);
  const wrongs=q.c.filter(c=>!c.ok);
  const wrong=wrongs[Math.floor(Math.random()*wrongs.length)];
  const two=[correct,wrong].sort(()=>Math.random()-.5);
  two.forEach(ch=>{
    const b=document.createElement('button');b.className='choice';
    b.innerHTML=`<span class="choice-ico">${ch.i}</span><span class="choice-label">${ch.l}</span><span class="choice-sub">${ch.s}</span>`;
    b.onclick=()=>pick(b,ch,q);st.appendChild(b);
  });
}
function pick(btn,ch,q){
  if(ANS)return;ANS=true;
  document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;b.classList.add('dim');});
  RS.push(ch.ok);
  if(ch.ok){btn.classList.remove('dim');btn.classList.add('correct');showFB(true,q.e);}
  else{
    btn.classList.remove('dim');btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{
      const lbl=b.querySelector('.choice-label').textContent;
      if(q.c.find(c2=>c2.l===lbl&&c2.ok)){b.classList.remove('dim');b.classList.add('correct');}
    });
    showFB(false,q.e);
  }
  // wait for user tap
document.getElementById('fbOverlay').style.pointerEvents='all';
}
function showFB(ok,d){
  const o=document.getElementById('fbOverlay');
  document.getElementById('fbBig').textContent=ok?'✅':'❌';
  document.getElementById('fbTitle').textContent=ok?'ถูกต้อง! 🎉':'เกือบแล้ว!';
  document.getElementById('fbDetail').textContent=d;
  // Show CRC Tips
  const tipsEl=document.getElementById('fbTips');
  const tip=CF?CRC_TIPS[CF.id]:null;
  if(tip){
    tipsEl.innerHTML=`<div class="fb-tips-icon">💡</div><div class="fb-tips-body"><div class="fb-tips-label">✨ CRC Career Tips</div><div class="fb-tips-text">${tip}</div></div>`;
    tipsEl.style.display='flex';
  } else {
    tipsEl.style.display='none';
  }
  o.className='feedback-overlay show '+(ok?'ok':'fail');
}
function hideFB(){
  const o=document.getElementById('fbOverlay');
  o.className='feedback-overlay';
  o.style.pointerEvents='none';
}
function nextQ(){
  hideFB();
  CI++;
  if(CI>=5) showRes();
  else renderQ();
}
function showRes(){
  const f=CF,sc=RS.filter(Boolean).length;
  document.getElementById('resFacEmoji').textContent=f.emoji;
  document.getElementById('resScore').textContent=sc;
  const rd=document.getElementById('resDots');rd.innerHTML='';
  RS.forEach(r=>{const sd=document.createElement('div');sd.className='sdot '+(r?'ok':'fail');sd.textContent=r?'✓':'✕';rd.appendChild(sd);});
  let t,m;
  if(sc===5){t='🏆 เก่งมากเลย!';m=`<strong>ยอดเยี่ยม!</strong> คุณรู้จักสาย<strong>${f.name}</strong>ลึกมาก พร้อมแล้วสำหรับโลกการทำงาน!`;}
  else if(sc>=3){t='👏 ดีมาก!';m=`<strong>ไม่เลวเลย!</strong> รู้จักสาย<strong>${f.name}</strong>พอสมควร ลองหาข้อมูลเพิ่มดูนะ!`;}
  else{t='🌱 เริ่มต้นดีแล้ว!';m=`ยังมีอะไรในสาย<strong>${f.name}</strong>ให้เรียนรู้อีกมาก ลองเล่นอีกรอบสิ!`;}
  document.getElementById('resTitle').textContent=t;
  document.getElementById('resMsg').innerHTML=m;
  showS('screenResult');if(sc>=3)confetti();
}
function playAgainSameFac(){startFac(CF);}
function goHome(){showS('screenHome');}
function showS(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function confetti(){
  const w=document.getElementById('confettiWrap');w.innerHTML='';
  const C=['#E91E8C','#F4C430','#FF4DB8','#00E676','#fff','#7B1C3A'];
  for(let i=0;i<80;i++){
    const cp=document.createElement('div');cp.className='cp';
    cp.style.left=Math.random()*100+'vw';cp.style.background=C[Math.floor(Math.random()*C.length)];
    const sz=6+Math.random()*8;cp.style.width=sz+'px';cp.style.height=sz+'px';
    cp.style.borderRadius=Math.random()>.5?'50%':'2px';
    cp.style.animationDuration=(2+Math.random()*2)+'s';cp.style.animationDelay=(Math.random()*.8)+'s';
    w.appendChild(cp);setTimeout(()=>cp.remove(),4000);
  }
}
buildHome();
</script>
